<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AI Prompt Librairy</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <button class="promptRequest">Générer</button>
        <div class="promptResponse"></div>

        <div class="rectangle"></div>
           
        <form id="addPromptForm">
            <h2>Ajouter un <span>prompt</span></h2>

            <label for="title">Titre <span>*</span></label>
            <input id="title" name="title" type="text" placeholder="Ex : Rédaction d'emails pro…" required />

            <label for="categorie">Catégorie <span>*</span></label>
            <input id="categorie" name="categorie" type="text" placeholder="Ex : Écriture, Code, Analyse…" required />

            <label for="text">Contenu du prompt <span>*</span></label>
            <textarea id="text" name="text" placeholder="Écris ici ton prompt complet…" required></textarea>

            <button class="addPrompt">Ajouter à la librairie</button>
        </form>
    </body>

    <footer>

    </footer>
    <script src="app.js"></script>
</html>
